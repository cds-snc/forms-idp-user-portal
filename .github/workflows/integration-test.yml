name: Integration test

on:
  workflow_call:
    inputs:
      idp_url:
        required: true
        type: string
    secrets:
      username:
        required: true
      password:
        required: true
      totp_secret:
        required: true
      waf_geo_restriction_bypass:
        required: true

permissions:
  contents: read

jobs:
  integration-test:
    runs-on: ubuntu-latest
    container:
      # Playwright Docker image tag must match the pnpm-lock.yaml pinned version
      image: mcr.microsoft.com/playwright:v1.59.1-noble@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
      options: --user 1001
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
  
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Run integration tests
        env:
          IDP_URL: ${{ inputs.idp_url }}
          USERNAME: ${{ secrets.username }}
          PASSWORD: ${{ secrets.password }}
          TOTP_SECRET: ${{ secrets.totp_secret }}
          WAF_GEO_RESTRICTION_BYPASS: ${{ secrets.waf_geo_restriction_bypass }}
        run: 
          pnpm test:playwright
