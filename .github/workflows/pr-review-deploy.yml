name: PR review deploy

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize

env:
  AWS_REGION: ca-central-1
  FUNCTION_NAME: idp-login-pr
  GITHUB_SHA: ${{ github.sha }}
  IMAGE: idp-login-pr
  REGISTRY_PREFIX: ${{ vars.STAGING_AWS_ACCOUNT_ID }}.dkr.ecr.ca-central-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::${{ vars.STAGING_AWS_ACCOUNT_ID }}:role/idp-login-pr

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  pr-review-build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.STAGING_AWS_ACCOUNT_ID }}:role/platform-unified-accounts-user-portal-pr-review-deploy
          role-session-name: PRReviewECRPush
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Set envs
        run: echo "PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")" >> $GITHUB_ENV

      - name: Delete old images
        run: |
          IMAGES_TO_DELETE="$(aws ecr list-images --repository-name $IMAGE --filter "tagStatus=TAGGED" --query "imageIds[?starts_with(imageTag, 'pr-$PR_NUMBER')]" --output json)"
          aws ecr batch-delete-image \
            --repository-name $IMAGE \
            --image-ids "$IMAGES_TO_DELETE" || true

      - name: Build and push image
        run: |
          docker buildx build \
            --push \
            --provenance=false \
            --platform linux/arm64 \
            --build-arg GIT_SHA=$GITHUB_SHA \
            -t "$REGISTRY_PREFIX/$IMAGE:pr-$PR_NUMBER-$GITHUB_SHA" \
            -f Dockerfile.pr \
            .

  pr-review-deploy:
    runs-on: ubuntu-latest
    needs: pr-review-build
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Audit DNS requests
        uses: cds-snc/dns-proxy-action@9ad793100229573be3f5ba78cc69ec523f2c8b7e # v1.1.0
        env:
          DNS_PROXY_FORWARDTOSENTINEL: "true"
          DNS_PROXY_LOGANALYTICSWORKSPACEID: "${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}"
          DNS_PROXY_LOGANALYTICSSHAREDKEY: "${{ secrets.LOG_ANALYTICS_WORKSPACE_KEY }}"
          DNS_PROXY_SAFELIST: "${{ vars.DNS_PROXY_SAFELIST }}"
          DNS_PROXY_WILDCARDGREEDY: "true"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.STAGING_AWS_ACCOUNT_ID }}:role/platform-unified-accounts-user-portal-pr-review-deploy
          role-session-name: PRReviewDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Set envs
        run: echo "PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")" >> $GITHUB_ENV

      - name: Deploy the review environment
        id: deploy
        run: |
          URL=$(.github/workflows/scripts/pr-review-deploy.sh \
            "$FUNCTION_NAME-$PR_NUMBER" \
            "$REGISTRY_PREFIX/$IMAGE:pr-$PR_NUMBER-$GITHUB_SHA" \
            "$ROLE_ARN" \
            "${{ secrets.PR_REVIEW_ENV_SUBNET_IDS }}" \
            "${{ secrets.PR_REVIEW_ENV_SECURITY_GROUP_IDS }}")
          echo "URL=$URL" >> $GITHUB_OUTPUT

      - name: PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commentId = "<!--pr-url-->";
            const pr = {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };
            const comments = await github.paginate(github.rest.issues.listComments, pr);
            const isComment = comments.some(comment => comment.body.includes(commentId));
            if (!isComment) {
              github.rest.issues.createComment({
                ...pr,
                body: `${commentId}## :test_tube: Review environment\n${{ steps.deploy.outputs.url }}ui/v2`
              });
            }

  pr-integration-test:
    needs: pr-review-deploy
    uses: ./.github/workflows/integration-test.yml
    with:
      idp_url: ${{ needs.pr-review-deploy.outputs.url }}ui/v2
    secrets:
      username: ${{ secrets.STAGING_INTEGRATION_TEST_USERNAME }}
      password: ${{ secrets.STAGING_INTEGRATION_TEST_PASSWORD }}
      totp_secret: ${{ secrets.STAGING_INTEGRATION_TEST_TOTP_SECRET }}
      waf_geo_restriction_bypass: ${{ secrets.STAGING_WAF_GEO_RESTRICTION_BYPASS }}
